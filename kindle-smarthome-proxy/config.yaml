name: "Kindle SmartHome Proxy"
description: "WebSocket proxy that bridges a jailbroken Kindle dashboard to Home Assistant"
version: "1.0.1"
slug: "kindle-smarthome-proxy"
url: "https://github.com/yatharth5/kindle-smarthome-ha-addon"
arch:
  - aarch64
  - amd64
  - armv7
  - armhf
  - i386
init: false
options:
  ha_url: "http://192.168.1.127:8123"
  ha_token: ""
  kindle_token: ""
schema:
  ha_url: str
  ha_token: str
  kindle_token: str
ports:
  4365/tcp: 4365
ports_description:
  4365/tcp: "Kindle WebSocket proxy"
